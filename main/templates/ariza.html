<!DOCTYPE html>
<html lang="uz">
<head>

    <title>Kursga ro'yxatdan o'tish</title>
</head>
<body>

<h1>Kursga ro'yxatdan o'tish</h1>

<form method="post">

    {% csrf_token %}

    {{ form.as_div }}

    <h3>Yosh maydonini qo'lda chiqarish</h3>

        Yuborish
    </button>

</form>

</body>
</html>
